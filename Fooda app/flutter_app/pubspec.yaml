name: fooda_app
description: "Fooda is a smart nutrition tracking app."

# 版本號遵循語義化版本控制
version: 1.1.1+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI 相關
  cupertino_icons: ^1.0.2
  
  # 狀態管理
  provider: ^6.1.2
  
  # 本地存儲
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  
  # 網絡請求
  http: ^1.2.1
  dio: ^5.4.3+1
  
  # 圖片處理
  image_picker: ^1.1.2
  image: ^4.2.0
  camera: ^0.10.6
  
  # 權限管理
  permission_handler: ^11.3.1
  
  # 本地通知
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  flutter_native_timezone: ^2.0.0
  
  # 國際化
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  
  # JSON 序列化
  json_annotation: ^4.9.0
  
  # 啟動畫面
  flutter_native_splash: ^2.4.0
  
  # 用戶引導和動畫
  introduction_screen: ^3.1.12
  lottie: ^3.1.2
  
  # 社交登入已移除 - 所有數據存儲在本地
  # google_sign_in: ^6.1.5
  # sign_in_with_apple: ^6.1.1
  
  # 應用內購買
  in_app_purchase: ^3.1.13
  showcaseview: ^5.0.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  file_picker: ^10.3.7
  sign_in_with_apple: ^7.0.1
  # icloud_storage: ^2.2.0
  flutter_animate: ^4.5.2
  google_mobile_ads: ^6.0.0
  
  # Firebase 雲端服務 - 暫時禁用解決依賴衝突
  # firebase_core: ^2.15.1
  # firebase_auth: ^4.7.3
  # cloud_firestore: ^4.8.5
  # firebase_storage: ^11.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # 程式碼分析
  flutter_lints: ^3.0.0
  
  # JSON 序列化
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  
  # App Icon 生成
  flutter_launcher_icons: ^0.13.1

# Flutter 配置
flutter:
  uses-material-design: true
  
  # 國際化生成
  generate: true
  
  # 資源檔案
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
  
  # 字體
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

# App Icon 配置
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"